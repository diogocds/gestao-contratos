  <body class="nav-md">
	<div class="container body">
		<div class="main_container">
			<div class="col-md-3 left_col">
				<div class="left_col scroll-view">
					<div class="navbar nav_title" style="border: 0; padding-left: 20px;">

                    <br />

			</div>

			<!-- top navigation -->

			<!-- /top navigation -->

			<!-- page content -->
			<div class="right_col" role="main">
				<div class="">
					<div class="page-title">
						<div class="title_left">
							<h3>Listar Parceiros</h3>
						</div>
					</div>
					<div class="clearfix"></div>
					<div class="row">
						<div class="col-md-12 col-sm-12 ">
							<div class="x_panel">
								<div class="x_content">
									<br />
									<div id="postos-lista">
										<!-- start project list -->
										<table class="table table-striped projects">
											<thead>
												<tr>
													<th style="width: 1%">#</th>
													<th style="width: 70%">Nome</th>
													<th style="width: 20%">Ações</th>
												</tr>
											</thead>
											<tbody id="pontos-corpo">
											</tbody>
										</table>
										<!-- end project list -->
									</div>
							
									<script>

										// Função para carregar os pontos
										async function carregarPontos() {
											try {
												const response = await fetch('/pontos');
												const pontos = await response.json();
												
												const pontosCorpo = document.getElementById('pontos-corpo');
							
												pontos.forEach(ponto => {
													const linhaPonto = document.createElement('tr');
													
													linhaPonto.innerHTML = `
														<td>#</td>
														<td><a>${ponto.nome}</a></td>
														<td>
															<a href="#" class="btn btn-info btn-xs"><i class="fa fa-pencil"></i> Editar </a>
															<a href="#" class="btn btn-danger btn-xs" onclick="deletarPonto('${ponto.id}', this)"><i class="fa fa-trash-o"></i> Deletar </a>
														</td>
													`;
													
													pontosCorpo.appendChild(linhaPonto);
												});
											} catch (error) {
												console.error('Erro ao carregar pontos:', error);
											}
										}
							
										// Deleta Ponto
										async function deletarPonto(id, link) {
											try {
												const response = await fetch(`/pontos/${id}`, {
													method: 'DELETE'
												});
							
												if (response.ok) {
													alert('Ponto turístico deletado com sucesso!');
													// Remove a linha da tabela sem recarregar a página
													link.closest('tr').remove(); // remove a linha que contém o botão de deletar
												} else {
													const errorData = await response.json();
													alert(`Erro ao deletar Ponto turístico: ${errorData.message}`);
												}
											} catch (error) {
												console.error('Erro ao deletar Ponto turístico:', error);
											}
										}
							
										// Carregar os Ponto turístico quando a página carregar
										window.addEventListener('load', carregarPontos);

									</script>
								</div>
							</div>
