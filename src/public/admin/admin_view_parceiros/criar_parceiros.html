											<script>
												document.getElementById('cpf').addEventListener('input', function () {
													let cpf = this.value.replace(/\D/g, '');

														cpf = cpf.replace(/(\d{3})(\d)/, '$1.$2');
														cpf = cpf.replace(/(\d{3})(\d)/, '$1.$2');
														cpf = cpf.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

										<div class="item form-group">

												<button type="button" class="btn btn-success" onclick="getLocation()">Obter Localização</button>
											</div>

										<script>
											function getLocation() {
												if ("geolocation" in navigator) {
													navigator.geolocation.getCurrentPosition(
														(position) => {
															const latitude = position.coords.latitude;
															const longitude = position.coords.longitude;
											
															// Preenche os campos de latitude e longitude
															document.getElementById('latitude').value = latitude;
															document.getElementById('longitude').value = longitude;
														},
														(error) => {
															alert("Erro ao obter a localização: " + error.message);
														}
													);
												} else {
													alert("Geolocalização não é suportada neste navegador.");
												}
											}
										</script>

									<script>
										// Função para carregar o CEP
										document.getElementById('cep').addEventListener('input', function () {
											const cep = this.value.replace(/\D/g, ''); // Remove caracteres não numéricos
									
											if (cep.length === 8) { // Se o CEP tiver 8 dígitos, faz a consulta
												fetch(`https://viacep.com.br/ws/${cep}/json/`)
													.then(response => response.json())
													.then(data => {
														if (!data.erro) {
															document.getElementById('logradouro').value = data.logradouro || '';
															document.getElementById('bairro').value = data.bairro || '';
															document.getElementById('uf').value = data.uf || '';
															document.getElementById('localidade').value = data.localidade || '';
															document.getElementById('municipio_id').value = data.ibge || ''; // Armazena o código IBGE
														} else {
															alert('CEP não encontrado.');
														}
													})
													.catch(error => console.error('Erro na consulta ao ViaCEP:', error));
											}
										});
									</script>

									<script>
										function mostrarCampos() {
											var pessoaFisica = document.getElementById('pessoaFisica').checked;
											var pessoaJuridica = document.getElementById('pessoaJuridica').checked;

											document.getElementById('camposFisica').style.display = pessoaFisica ? 'block' : 'none';
											document.getElementById('camposJuridica').style.display = pessoaJuridica ? 'block' : 'none';
										}
									</script>

									<script>
									    // Função para carregar as categorias e preencher o select
										async function carregarCategorias() {
											try {
												const response = await fetch('/categorias/parceiros');
												const categorias = await response.json();
												
												// Populando o select de categorias
												const selectCategoria = document.querySelector('select[name="categoria_id"]');
												categorias.forEach(categoria => {
													const option = document.createElement('option');
													option.value = categoria.id;
													option.textContent = categoria.nome;
													selectCategoria.appendChild(option);
												});
											} catch (error) {
												console.error('Erro ao carregar estados:', error);
											}

										}

										// Carregar as categorias quando a página carregar
										window.addEventListener('load', carregarCategorias);
									</script>

									<script>
										let telefoneIndex = 1; // Começa em 1 porque já existe o primeiro campo
										const maxTelefones = 3; // Define o limite de 3 telefones

										function addTelefone() {
											// Verifica se o número de campos já atingiu o limite
											const totalTelefones = document.querySelectorAll('input[name="telefones[]"]').length;
											if (totalTelefones >= maxTelefones) {
												alert("Você só pode adicionar no máximo 3 telefones.");
												return;
											}

											// Cria o novo campo de telefone com id único
											const novoTelefone = `
												<div class="item form-group" id="telefone-${telefoneIndex}">
													<label class="col-form-label col-md-4 col-sm-4 label-align" for="telefones">Telefone</label>
													<div class="col-md-8 col-sm-8">
														<div class="input-group" style="margin-bottom: -5px">
															<input class="form-control telefone-mask" type="text" name="telefones[]" id="telefone-input-${telefoneIndex}" maxlength="15">
															<div class="input-group-append">
																<button type="button" class="btn btn-danger" onclick="removeTelefone(${telefoneIndex})"> - </button>
															</div>
														</div>
													</div>
												</div>
											`;

											// Insere o novo campo no container
											document.getElementById('telefones-container').insertAdjacentHTML('beforeend', novoTelefone);

											// Aplica a máscara ao novo campo de telefone
											applyPhoneMask(`telefone-input-${telefoneIndex}`);

											telefoneIndex++; // Incrementa o índice
										}

										// Função para remover o campo de telefone
										function removeTelefone(index) {
											const telefoneField = document.getElementById(`telefone-${index}`);
											telefoneField.remove();
										}

										// Função para aplicar a máscara de telefone
										function applyPhoneMask(elementId) {
											const telefoneInput = document.getElementById(elementId);
											telefoneInput.addEventListener('input', function () {
												let telefone = this.value.replace(/\D/g, ''); // Remove caracteres não numéricos

												if (telefone.length <= 11) {
													telefone = telefone.replace(/(\d{2})(\d)/, '($1) $2'); // Adiciona parênteses em volta do DDD
													telefone = telefone.replace(/(\d{5})(\d)/, '$1-$2');    // Adiciona hífen após os primeiros 5 dígitos do número
												}

												this.value = telefone; // Atualiza o valor do campo com a máscara
											});
										}

										// Aplica a máscara ao campo de telefone inicial (caso já exista)
										applyPhoneMask('telefone-input-0');

									</script>

									<script>
										// Função para adicionar horários dinamicamente até o limite de 2
										function adicionarHorario(dia, index) {
										const container = document.getElementById(`${dia}-horarios-${index}`);
										const horarios = container.getElementsByClassName('horario-group');

										if (horarios.length < 2) { // Limite de 2 horários
											const newHorario = document.createElement('div');
											newHorario.classList.add('horario-group', 'd-flex', 'align-items-center', 'mt-2');
											newHorario.innerHTML = `
											<input type="time" name="horarios[${index}][${dia}][inicio][]" class="form-control" placeholder="Início">
											<input type="time" name="horarios[${index}][${dia}][fim][]" class="form-control" placeholder="Fim">
											<button type="button" onclick="removerHorario(this)" class="btn btn-sm btn-danger ml-2">Remover</button>
											`;
											container.appendChild(newHorario);
										} else {
											alert("Você pode adicionar até 2 horários por dia.");
										}
										}

										// Função para remover horários
										function removerHorario(button) {
										button.parentElement.remove();
										}
									</script>
